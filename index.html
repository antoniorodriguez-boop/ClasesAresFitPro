<script>
    // Configuració d'horaris
    const timetable = {
        'Dilluns': [{ id: 'mon1', h: '10-11', a: 'Spinning' }, { id: 'mon2', h: '18-19', a: 'Zumba' }, { id: 'mon3', h: '19-20', a: 'Pilates' }],
        'Dimarts': [{ id: 'tue1', h: '10-11', a: 'Zumba' }, { id: 'tue2', h: '16-17', a: 'Pilates' }, { id: 'tue3', h: '19-20', a: 'Spinning' }],
        'Dimecres': [{ id: 'wed1', h: '11-12', a: 'Spinning' }, { id: 'wed2', h: '16-17', a: 'Pilates' }, { id: 'wed3', h: '18-19', a: 'Zumba' }],
        'Dijous': [{ id: 'thu1', h: '10-11', a: 'Pilates' }, { id: 'thu2', h: '11-12', a: 'Spinning' }, { id: 'thu3', h: '19-20', a: 'Zumba' }],
        'Divendres': [{ id: 'fri1', h: '11-12', a: 'Zumba' }, { id: 'fri2', h: '16-17', a: 'Spinning' }, { id: 'fri3', h: '18-19', a: 'Pilates' }],
        'Dissabte': [{ id: 'sat1', h: '10-11', a: 'Zumba' }, { id: 'sat2', h: '11-12', a: 'Pilates' }, { id: 'sat3', h: '18-19', a: 'Spinning' }]
    };

    const dies = ['Diumenge', 'Dilluns', 'Dimarts', 'Dimecres', 'Dijous', 'Divendres', 'Dissabte'];

    async function render() {
        const ara = new Date();
        const nomDia = dies[ara.getDay()];
        document.getElementById('current-date').innerText = nomDia + ", " + ara.toLocaleDateString();
        
        try {
            // CORRECCIÓ: Ara apunta al teu fitxer PHP local
            const response = await fetch('get_counts.php');
            const counts = await response.json();

            const clases = timetable[nomDia] || [];
            const container = document.getElementById('classes-container');
            const select = document.getElementById('class-select');
            
            container.innerHTML = '';
            select.innerHTML = '<option value="" disabled selected>Tria una classe de la llista</option>';

            if (clases.length === 0) {
                container.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>Avui no hi ha classes programades.</p>";
                return;
            }

            clases.forEach(c => {
                const numActual = counts[c.a] || 0; // Busquem pel nom de la classe (Spinning, Zumba, etc.)
                const isFull = numActual >= 20;

                container.innerHTML += `
                    <div class="class-card glass ${c.a.toLowerCase()}">
                        <span class="time-tag">${c.h}h</span>
                        <h2>${c.a}</h2>
                        <p class="capacity-info">Reservats: <strong>${numActual}/20</strong></p>
                        <button class="btn-book" ${isFull ? 'disabled' : ''} onclick="setSelect('${c.a}')">
                            ${isFull ? 'CLASSE PLENA' : 'Reservar'}
                        </button>
                    </div>
                `;

                if (!isFull) {
                    const opt = document.createElement('option');
                    opt.value = c.a; // Enviem el nom de la classe
                    opt.text = `${c.a} (${c.h}h)`;
                    select.appendChild(opt);
                }
            });
        } catch (error) {
            console.error("Error carregant dades:", error);
            document.getElementById('classes-container').innerHTML = "<p style='text-align:center; color:red;'>Error de connexió amb el servidor PHP.</p>";
        }
    }

    window.setSelect = (id) => {
        document.getElementById('class-select').value = id;
        document.getElementById('apuntat').scrollIntoView({behavior: 'smooth'});
    };

    // GESTIÓ DEL FORMULARI
    document.getElementById('booking-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('submit-btn');
        btn.disabled = true;
        btn.innerText = "Processant...";

        // CORRECCIÓ: Enviem dades com a FORM DATA per a que el PHP les rebi a $_POST
        const formData = new FormData();
        formData.append('dni', document.getElementById('user-dni').value);
        formData.append('clase_id', document.getElementById('class-select').value);

        try {
            // CORRECCIÓ: Ara apunta al teu reserva.php
            const response = await fetch('reserva.php', {
                method: 'POST',
                body: formData
            });

            const resData = await response.json();
            alert(resData.message);

            if(resData.status === "success") {
                location.reload();
            }
        } catch (error) {
            alert("Error crític de connexió amb reserva.php");
        } finally {
            btn.disabled = false;
            btn.innerText = "Confirmar Reserva";
        }
    });

    render();
</script>
