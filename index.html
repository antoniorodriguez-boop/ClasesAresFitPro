<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Classes | OPTIMAFIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060a13;
            --bg-card: rgba(16, 24, 45, 0.7);
            --accent-zumba: #ff007a;
            --accent-spinning: #00f2fe;
            --accent-pilates: #00ff88;
            --text-main: #ffffff;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
        }

        header { padding: 30px 5%; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-spinning); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-align: center; }
        .date-info { text-align: center; color: var(--accent-spinning); font-weight: 600; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        /* GRID DE CLASSES */
        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .class-card {
            padding: 40px 30px;
            transition: 0.4s;
            text-align: center;
        }

        .class-card h2 { margin-bottom: 15px; font-size: 1.8rem; }
        .status-pill {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
        }

        .zumba { border-bottom: 4px solid var(--accent-zumba); }
        .spinning { border-bottom: 4px solid var(--accent-spinning); }
        .pilates { border-bottom: 4px solid var(--accent-pilates); }

        .btn-book {
            display: inline-block;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .zumba .btn-book { background: var(--accent-zumba); color: white; }
        .spinning .btn-book { background: var(--accent-spinning); color: black; }
        .pilates .btn-book { background: var(--accent-pilates); color: black; }

        .btn-book.full { background: #444 !important; color: #888 !important; cursor: not-allowed; }

        /* FORMULARI */
        .registration-form { max-width: 600px; margin: 0 auto; padding: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--accent-spinning); }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
        }

        /* Corregir letras negras en select */
        select option { background: #10182d; color: white; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--accent-spinning), #7000ff);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">OPTIMA<span>FIT</span></a>
    </header>

    <div class="container">
        <h1 id="day-title">Classes de la Setmana</h1>
        <p class="date-info" id="current-date"></p>

        <div class="classes-grid" id="classes-container">
            </div>

        <div id="apuntat" class="registration-form glass">
            <h2 style="text-align: center; margin-bottom: 30px;">Reserva la teva plaça</h2>
            <form id="booking-form">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="user-name" placeholder="El teu nom..." required>
                </div>
                <div class="form-group">
                    <label>Classe i Horari</label>
                    <select id="class-select">
                        </select>
                </div>
                <div class="form-group">
                    <p id="counter-text" style="font-size: 0.8rem; text-align: center; color: #888;">Places ocupades avui: <span id="count-num">0</span>/20</p>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Confirmar Reserva</button>
            </form>
        </div>
    </div>

    <script>
        // 1. Base de dades del calendari (Basat en la teva foto)
        const timetable = {
            'Dilluns': [
                { hora: '10:00-11:00', activitat: 'Spinning' },
                { hora: '18:00-19:00', activitat: 'Zumba' },
                { hora: '19:00-20:00', activitat: 'Pilates' }
            ],
            'Dimarts': [
                { hora: '10:00-11:00', activitat: 'Zumba' },
                { hora: '16:00-17:00', activitat: 'Pilates' },
                { hora: '19:00-20:00', activitat: 'Spinning' }
            ],
            'Dimecres': [
                { hora: '11:00-12:00', activitat: 'Spinning' },
                { hora: '16:00-17:00', activitat: 'Pilates' },
                { hora: '18:00-19:00', activitat: 'Zumba' }
            ],
            'Dijous': [
                { hora: '10:00-11:00', activitat: 'Pilates' },
                { hora: '11:00-12:00', activitat: 'Spinning' },
                { hora: '19:00-20:00', activitat: 'Zumba' }
            ],
            'Divendres': [
                { hora: '11:00-12:00', activitat: 'Zumba' },
                { hora: '16:00-17:00', activitat: 'Spinning' },
                { hora: '18:00-19:00', activitat: 'Pilates' }
            ],
            'Dissabte': [
                { hora: '10:00-11:00', activitat: 'Zumba' },
                { hora: '11:00-12:00', activitat: 'Pilates' },
                { hora: '18:00-19:00', activitat: 'Spinning' }
            ]
        };

        const diesSetmana = ['Diumenge', 'Dilluns', 'Dimarts', 'Dimecres', 'Dijous', 'Divendres', 'Dissabte'];
        
        // 2. Simulació de comptador de persones (En una web real això vindria d'una base de dades)
        let inscritosHoy = Math.floor(Math.random() * 15); // Simulem que ja hi ha gent
        
        function updateUI() {
            const ara = new Date();
            const nomDia = diesSetmana[ara.getDay()];
            document.getElementById('current-date').innerText = nomDia + ", " + ara.toLocaleDateString();
            
            const classesAvui = timetable[nomDia] || [];
            const container = document.getElementById('classes-container');
            const select = document.getElementById('class-select');
            const countNum = document.getElementById('count-num');
            
            countNum.innerText = inscritosHoy;
            container.innerHTML = '';
            select.innerHTML = '';

            if (classesAvui.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Avui el gimnàs està obert (6-23h) però no hi ha classes dirigides.</p>";
            }

            classesAvui.forEach(c => {
                // Crear targetes
                const card = document.createElement('div');
                card.className = `class-card glass ${c.activitat.toLowerCase()}`;
                card.innerHTML = `
                    <div class="status-pill">${c.hora}</div>
                    <h2>${c.activitat}</h2>
                    <p>Classe dirigida per millorar la teva forma.</p>
                    <button class="btn-book ${inscritosHoy >= 20 ? 'full' : ''}" onclick="window.location.href='#apuntat'">
                        ${inscritosHoy >= 20 ? 'Llimit assolit' : 'Reservar'}
                    </button>
                `;
                container.appendChild(card);

                // Afegir al select
                const opt = document.createElement('option');
                opt.value = `${c.activitat} - ${c.hora}`;
                opt.text = `${c.activitat} (${c.hora})`;
                select.appendChild(opt);
            });

            // Bloquejar botó si s'arriba a 20
            if (inscritosHoy >= 20) {
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').innerText = "LIMIT DIARI ASSOLIT";
            }
        }

        // 3. Maneig del formulari
        document.getElementById('booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            if (inscritosHoy < 20) {
                inscritosHoy++;
                alert("Reserva confirmada! T'esperem.");
                updateUI();
            }
        });

        updateUI();
    </script>
</body>
</html>
