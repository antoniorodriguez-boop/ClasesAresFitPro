<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Classes | OPTIMAFIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060a13;
            --bg-card: rgba(16, 24, 45, 0.7);
            --accent-zumba: #ff007a;
            --accent-spinning: #00f2fe;
            --accent-pilates: #00ff88;
            --text-main: #ffffff;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
        }

        header { padding: 30px 5%; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-spinning); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-align: center; }
        .date-info { text-align: center; color: var(--accent-spinning); font-weight: 600; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .class-card {
            padding: 40px 30px;
            transition: 0.4s;
            text-align: center;
            position: relative;
        }

        .class-card h2 { margin-bottom: 5px; font-size: 1.8rem; }
        .time-tag { font-size: 0.9rem; color: var(--accent-spinning); font-weight: 600; margin-bottom: 15px; display: block; }
        
        .capacity-info {
            font-size: 0.8rem;
            margin-bottom: 20px;
            color: #888;
        }

        .zumba { border-bottom: 4px solid var(--accent-zumba); }
        .spinning { border-bottom: 4px solid var(--accent-spinning); }
        .pilates { border-bottom: 4px solid var(--accent-pilates); }

        .btn-book {
            display: inline-block;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .zumba .btn-book { background: var(--accent-zumba); color: white; }
        .spinning .btn-book { background: var(--accent-spinning); color: black; }
        .pilates .btn-book { background: var(--accent-pilates); color: black; }

        .btn-book.full { background: #333 !important; color: #666 !important; cursor: not-allowed; }

        /* FORMULARI */
        .registration-form { max-width: 500px; margin: 0 auto; padding: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--accent-spinning); text-transform: uppercase; }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: inherit;
        }

        select option { background: #060a13; color: white; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--accent-spinning), #7000ff);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-submit:disabled { background: #222; color: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">OPTIMA<span>FIT</span></a>
    </header>

    <div class="container">
        <h1 id="day-title">Horari d'Avui</h1>
        <p class="date-info" id="current-date"></p>

        <div class="classes-grid" id="classes-container">
            </div>

        <div id="apuntat" class="registration-form glass">
            <h2 style="text-align: center; margin-bottom: 30px;">Accés Usuari</h2>
            <form id="booking-form">
                <div class="form-group">
                    <label>DNI / NIE</label>
                    <input type="text" id="user-dni" placeholder="12345678X" required>
                </div>
                <div class="form-group">
                    <label>Contrasenya</label>
                    <input type="password" id="user-pass" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Classe a reservar</label>
                    <select id="class-select">
                        </select>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Realitzar Reserva</button>
            </form>
        </div>
    </div>

    <script>
        // Base de dades segons la teva foto
        const timetable = {
            'Dilluns': [
                { id: 'mon1', hora: '10:00-11:00', activitat: 'Spinning', cupo: 18 },
                { id: 'mon2', hora: '18:00-19:00', activitat: 'Zumba', cupo: 20 },
                { id: 'mon3', hora: '19:00-20:00', activitat: 'Pilates', cupo: 5 }
            ],
            'Dimarts': [
                { id: 'tue1', hora: '10:00-11:00', activitat: 'Zumba', cupo: 12 },
                { id: 'tue2', hora: '16:00-17:00', activitat: 'Pilates', cupo: 20 },
                { id: 'tue3', hora: '19:00-20:00', activitat: 'Spinning', cupo: 19 }
            ],
            'Dimecres': [
                { id: 'wed1', hora: '11:00-12:00', activitat: 'Spinning', cupo: 10 },
                { id: 'wed2', hora: '16:00-17:00', activitat: 'Pilates', cupo: 8 },
                { id: 'wed3', hora: '18:00-19:00', activitat: 'Zumba', cupo: 15 }
            ],
            'Dijous': [
                { id: 'thu1', hora: '10:00-11:00', activitat: 'Pilates', cupo: 20 },
                { id: 'thu2', hora: '11:00-12:00', activitat: 'Spinning', cupo: 2 },
                { id: 'thu3', hora: '19:00-20:00', activitat: 'Zumba', cupo: 20 }
            ],
            'Divendres': [
                { id: 'fri1', hora: '11:00-12:00', activitat: 'Zumba', cupo: 14 },
                { id: 'fri2', hora: '16:00-17:00', activitat: 'Spinning', cupo: 7 },
                { id: 'fri3', hora: '18:00-19:00', activitat: 'Pilates', cupo: 20 }
            ],
            'Dissabte': [
                { id: 'sat1', hora: '10:00-11:00', activitat: 'Zumba', cupo: 20 },
                { id: 'sat2', hora: '11:00-12:00', activitat: 'Pilates', cupo: 19 },
                { id: 'sat3', hora: '18:00-19:00', activitat: 'Spinning', cupo: 11 }
            ]
        };

        const diesSetmana = ['Diumenge', 'Dilluns', 'Dimarts', 'Dimecres', 'Dijous', 'Divendres', 'Dissabte'];

        function renderApp() {
            const ara = new Date();
            const nomDia = diesSetmana[ara.getDay()];
            document.getElementById('current-date').innerText = nomDia + ", " + ara.toLocaleDateString();
            
            const classesAvui = timetable[nomDia] || [];
            const container = document.getElementById('classes-container');
            const select = document.getElementById('class-select');
            
            container.innerHTML = '';
            select.innerHTML = '';

            if (classesAvui.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Avui no hi ha classes programades.</p>";
                document.getElementById('submit-btn').disabled = true;
                return;
            }

            classesAvui.forEach(c => {
                const isFull = c.cupo >= 20;
                
                // Targetes
                const card = document.createElement('div');
                card.className = `class-card glass ${c.activitat.toLowerCase()}`;
                card.innerHTML = `
                    <span class="time-tag">${c.hora}</span>
                    <h2>${c.activitat}</h2>
                    <p class="capacity-info">Places: <strong>${c.cupo}/20</strong></p>
                    <button class="btn-book ${isFull ? 'full' : ''}" 
                            onclick="${isFull ? '' : "setSelect('"+c.id+"')"}" 
                            ${isFull ? 'disabled' : ''}>
                        ${isFull ? 'CLASSE PLENA' : 'RESERVAR'}
                    </button>
                `;
                container.appendChild(card);

                // Opcions del select
                if (!isFull) {
                    const opt = document.createElement('option');
                    opt.value = c.id;
                    opt.text = `${c.activitat} (${c.hora})`;
                    select.appendChild(opt);
                }
            });
        }

        // Funció per marcar el select automàticament en clicar la targeta
        window.setSelect = function(id) {
            document.getElementById('class-select').value = id;
            document.getElementById('apuntat').scrollIntoView({behavior: 'smooth'});
        };

        // Gestió de la reserva
        document.getElementById('booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const classId = document.getElementById('class-select').value;
            const dni = document.getElementById('user-dni').value;
            
            // Trobar la classe a la "DB" i sumar 1
            const ara = new Date();
            const nomDia = diesSetmana[ara.getDay()];
            const clase = timetable[nomDia].find(c => c.id === classId);

            if (clase && clase.cupo < 20) {
                clase.cupo++;
                alert(`Perfecte! DNI ${dni}, la teva reserva per ${clase.activitat} ha estat confirmada.`);
                renderApp();
            } else {
                alert("Ho sentim, aquesta classe s'ha omplert mentre omplies el formulari.");
            }
        });

        renderApp();
    </script>
</body>
</html>
