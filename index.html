<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserva de Classes | OPTIMAFIT</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060a13;
            --bg-card: rgba(16, 24, 45, 0.7);
            --accent-zumba: #ff007a;
            --accent-spinning: #00f2fe;
            --accent-pilates: #00ff88;
            --text-main: #ffffff;
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding-bottom: 50px;
        }

        .glass {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            border: var(--glass-border);
            border-radius: 20px;
        }

        header { padding: 30px 5%; text-align: center; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-decoration: none; }
        .logo span { color: var(--accent-spinning); }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; text-align: center; }
        .date-info { text-align: center; color: var(--accent-spinning); font-weight: 600; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }

        .classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 60px;
        }

        .class-card {
            padding: 40px 30px;
            transition: 0.4s;
            text-align: center;
        }

        .time-tag { font-size: 0.9rem; color: var(--accent-spinning); font-weight: 600; margin-bottom: 10px; display: block; }
        .capacity-info { font-size: 0.8rem; margin-bottom: 20px; color: #888; }

        .zumba { border-bottom: 4px solid var(--accent-zumba); }
        .spinning { border-bottom: 4px solid var(--accent-spinning); }
        .pilates { border-bottom: 4px solid var(--accent-pilates); }

        .btn-book {
            display: inline-block;
            padding: 10px 25px;
            font-weight: 700;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
            width: 100%;
        }

        .zumba .btn-book { background: var(--accent-zumba); color: white; }
        .spinning .btn-book { background: var(--accent-spinning); color: black; }
        .pilates .btn-book { background: var(--accent-pilates); color: black; }

        .btn-book:disabled { background: #333 !important; color: #666 !important; cursor: not-allowed; }

        .registration-form { max-width: 500px; margin: 0 auto; padding: 40px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-size: 0.8rem; color: var(--accent-spinning); }
        
        input, select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
        }

        select option { background: #060a13; color: white; }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(90deg, var(--accent-spinning), #7000ff);
            border: none;
            color: white;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">OPTIMA<span>FIT</span></a>
    </header>

    <div class="container">
        <h1 id="day-title">Horari d'Avui</h1>
        <p class="date-info" id="current-date"></p>

        <div class="classes-grid" id="classes-container"></div>

        <div id="apuntat" class="registration-form glass">
            <h2 style="text-align: center; margin-bottom: 30px;">Accés Usuari</h2>
            <form id="booking-form">
                <div class="form-group">
                    <label>DNI / NIE</label>
                    <input type="text" id="user-dni" placeholder="12345678X" required>
                </div>
                <div class="form-group">
                    <label>Contrasenya</label>
                    <input type="password" id="user-pass" placeholder="••••••••" required>
                </div>
                <div class="form-group">
                    <label>Classe a reservar</label>
                    <select id="class-select"></select>
                </div>
                <button type="submit" class="btn-submit" id="submit-btn">Realitzar Reserva</button>
            </form>
        </div>
    </div>

    <script>
        // 1. CONFIGURACIÓ INICIAL
        const timetableData = {
            'Dilluns': [{ id: 'mon1', h: '10-11', a: 'Spinning' }, { id: 'mon2', h: '18-19', a: 'Zumba' }, { id: 'mon3', h: '19-20', a: 'Pilates' }],
            'Dimarts': [{ id: 'tue1', h: '10-11', a: 'Zumba' }, { id: 'tue2', h: '16-17', a: 'Pilates' }, { id: 'tue3', h: '19-20', a: 'Spinning' }],
            'Dimecres': [{ id: 'wed1', h: '11-12', a: 'Spinning' }, { id: 'wed2', h: '16-17', a: 'Pilates' }, { id: 'wed3', h: '18-19', a: 'Zumba' }],
            'Dijous': [{ id: 'thu1', h: '10-11', a: 'Pilates' }, { id: 'thu2', h: '11-12', a: 'Spinning' }, { id: 'thu3', h: '19-20', a: 'Zumba' }],
            'Divendres': [{ id: 'fri1', h: '11-12', a: 'Zumba' }, { id: 'fri2', h: '16-17', a: 'Spinning' }, { id: 'fri3', h: '18-19', a: 'Pilates' }],
            'Dissabte': [{ id: 'sat1', h: '10-11', a: 'Zumba' }, { id: 'sat2', h: '11-12', a: 'Pilates' }, { id: 'sat3', h: '18-19', a: 'Spinning' }]
        };

        const diesSetmana = ['Diumenge', 'Dilluns', 'Dimarts', 'Dimecres', 'Dijous', 'Divendres', 'Dissabte'];

        // 2. LÒGICA DE PERSISTÈNCIA I REINICI (LocalStorage)
        function getStorageData() {
            const todayStr = new Date().toLocaleDateString();
            const storedDate = localStorage.getItem('last_visit_date');
            
            // Si el dia guardat és diferent al d'avui, reiniciem a 0 (Funció 00:00)
            if (storedDate !== todayStr) {
                localStorage.setItem('last_visit_date', todayStr);
                const resetData = {};
                Object.values(timetableData).flat().forEach(c => resetData[c.id] = 0);
                localStorage.setItem('gym_counts', JSON.stringify(resetData));
                return resetData;
            }
            
            return JSON.parse(localStorage.getItem('gym_counts'));
        }

        function saveCount(classId, newCount) {
            const data = JSON.parse(localStorage.getItem('gym_counts'));
            data[classId] = newCount;
            localStorage.setItem('gym_counts', JSON.stringify(data));
        }

        // 3. RENDERITZAT
        function render() {
            const ara = new Date();
            const nomDia = diesSetmana[ara.getDay()];
            document.getElementById('current-date').innerText = nomDia + ", " + ara.toLocaleDateString();
            
            const classesAvui = timetableData[nomDia] || [];
            const counts = getStorageData();
            
            const container = document.getElementById('classes-container');
            const select = document.getElementById('class-select');
            container.innerHTML = '';
            select.innerHTML = '';

            classesAvui.forEach(c => {
                const currentNum = counts[c.id] || 0;
                const isFull = currentNum >= 20;

                container.innerHTML += `
                    <div class="class-card glass ${c.a.toLowerCase()}">
                        <span class="time-tag">${c.h}h</span>
                        <h2>${c.a}</h2>
                        <p class="capacity-info">Ocupació: <strong>${currentNum}/20</strong></p>
                        <button class="btn-book" ${isFull ? 'disabled' : `onclick="setSelect('${c.id}')"`}>
                            ${isFull ? 'CLASSE PLENA' : 'RESERVAR'}
                        </button>
                    </div>
                `;

                if (!isFull) {
                    select.innerHTML += `<option value="${c.id}">${c.a} (${c.h}h)</option>`;
                }
            });
        }

        window.setSelect = (id) => {
            document.getElementById('class-select').value = id;
            document.getElementById('apuntat').scrollIntoView({behavior: 'smooth'});
        };

        // 4. GESTIÓ DEL FORMULARI
        document.getElementById('booking-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const classId = document.getElementById('class-select').value;
            const counts = getStorageData();

            if (counts[classId] < 20) {
                counts[classId]++;
                saveCount(classId, counts[classId]);
                alert("Reserva confirmada correctament!");
                render();
            } else {
                alert("Ho sentim, la classe s'ha omplert.");
            }
        });

        render();
    </script>
</body>
</html>
